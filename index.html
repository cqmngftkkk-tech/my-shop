<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Global Luxury Supplier | Watches, Clothing, Shoes, Bags, Beauty, Perfume</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f7f7f7;color:#222}
header{background:#111;color:#fff;padding:16px 5%;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:99}
.site-name{font-size:18px;font-weight:500}
.head-select{display:flex;gap:10px}
select{padding:6px 10px;border-radius:4px;border:none;background:#fff;color:#111}
.container{max-width:1300px;margin:0 auto;padding:30px 3%}
.category{margin-bottom:25px}
.cat-item{display:inline-block;padding:8px 18px;border-radius:20px;background:#eee;margin:0 6px 8px;cursor:pointer}
.cat-item.active{background:#111;color:#fff}
.pro-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:24px}
.pro-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,0.08);cursor:pointer}
.pro-card img{width:100%;height:280px;object-fit:cover}
.pro-info{padding:16px}
.pro-name{font-size:16px;margin-bottom:8px}
.pro-price{color:#e63946;font-size:19px;font-weight:bold;margin:8px 0}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.9);display:none;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal-box{background:#fff;max-width:900px;width:100%;border-radius:12px;display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:20px;max-height:90vh;overflow-y:auto}
@media(max-width:768px){.modal-box{grid-template-columns:1fr}}
.img-box{display:flex;overflow-x:auto;gap:8px;padding-bottom:10px}
.img-box img{height:360px;border-radius:6px}
.close{position:absolute;top:15px;right:25px;color:#fff;font-size:30px;cursor:pointer}
.desc-text{line-height:1.7;margin:18px 0;color:#444}
.wa-btn{width:100%;padding:12px;background:#25D366;color:#fff;border:none;border-radius:6px;margin-top:10px;cursor:pointer}
.fixed-wa{position:fixed;right:20px;bottom:25px;width:56px;height:56px;border-radius:50%;background:#25D366;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;text-decoration:none;z-index:98}
</style>
</head>
<body>

<header>
<div class="site-name" id="siteTitle">Global Luxury Supplier</div>
<div class="head-select">
<select id="langSel">
<option value="zh-CN">中文</option>
<option value="en">English</option>
<option value="es">Español</option>
<option value="fr">Français</option>
<option value="de">Deutsch</option>
<option value="it">Italiano</option>
<option value="pt">Português</option>
<option value="ru">Русский</option>
<option value="ja">日本語</option>
<option value="ko">한국어</option>
<option value="th">ไทย</option>
<option value="vi">Tiếng Việt</option>
<option value="ms">Bahasa Melayu</option>
<option value="id">Bahasa Indonesia</option>
</select>

<select id="curSel">
<option value="CNY">CNY ¥</option>
<option value="USD">USD $</option>
<option value="EUR">EUR €</option>
<option value="GBP">GBP £</option>
<option value="AUD">AUD $</option>
<option value="CAD">CAD $</option>
<option value="SGD">SGD $</option>
<option value="HKD">HKD $</option>
<option value="JPY">JPY ¥</option>
<option value="KRW">KRW ₩</option>
<option value="THB">THB ฿</option>
<option value="MYR">MYR RM</option>
<option value="IDR">IDR Rp</option>
<option value="VND">VND ₫</option>
<option value="AED">AED د.إ</option>
</select>
</div>
</header>

<div class="container">
<div class="category" id="cateBox"></div>
<div class="pro-wrap" id="goodsBox"></div>
</div>

<div class="modal" id="bigModal">
<span class="close" onclick="closeModal()">×</span>
<div class="modal-box">
<div class="img-box" id="imgWrap"></div>
<div class="text-box">
<h3 id="popName"></h3>
<div class="pro-price" id="popPrice"></div>
<div class="desc-text" id="popDesc"></div>
<a id="popWaLink" target="_blank"><button class="wa-btn" id="popWaBtn"></button></a>
</div>
</div>
</div>

<a class="fixed-wa" id="fixedWa" target="_blank">WA</a>

<script>
// 全球语言（无繁体）
const langData = {
"zh-CN":{site:"全球奢侈品货源",all:"全部",watch:"手表",clothing:"服装",shoes:"鞋子",bag:"包包",beauty:"化妆品",perfume:"香水",waBtn:"WhatsApp咨询"},
"en":{site:"Global Luxury Supplier",all:"All",watch:"Watches",clothing:"Clothing",shoes:"Shoes",bag:"Bags",beauty:"Beauty",perfume:"Perfume",waBtn:"Chat on WhatsApp"},
"es":{site:"Suministros de Lujo",all:"Todos",watch:"Relojes",clothing:"Ropa",shoes:"Zapatos",bag:"Bolsos",beauty:"Belleza",perfume:"Perfume",waBtn:"WhatsApp"},
"fr":{site:"Fournisseur de Luxe",all:"Tous",watch:"Montres",clothing:"Vêtements",shoes:"Chaussures",bag:"Sacs",beauty:"Beauté",perfume:"Parfum",waBtn:"WhatsApp"},
"de":{site:"Luxus Lieferant",all:"Alle",watch:"Uhren",clothing:"Kleidung",shoes:"Schuhe",bag:"Taschen",beauty:"Schönheit",perfume:"Parfüm",waBtn:"WhatsApp"},
"it":{site:"Fornitore di Lusso",all:"Tutti",watch:"Orologi",clothing:"Abbigliamento",shoes:"Scarpe",bag:"Borse",beauty:"Bellezza",perfume:"Profumo",waBtn:"WhatsApp"},
"pt":{site:"Fornecedor de Luxo",all:"Todos",watch:"Relógios",clothing:"Roupas",shoes:"Sapatos",bag:"Bolsas",beauty:"Beleza",perfume:"Perfume",waBtn:"WhatsApp"},
"ru":{site:"Поставщик роскоши",all:"Все",watch:"Часы",clothing:"Одежда",shoes:"Обувь",bag:"Сумки",beauty:"Красота",perfume:"Парфюм",waBtn:"WhatsApp"},
"ja":{site:"グローバルラグジュアリー",all:"全て",watch:"腕時計",clothing:"衣類",shoes:"靴",bag:"バッグ",beauty:"コスメ",perfume:"香水",waBtn:"WhatsApp"},
"ko":{site:"명품 공급업체",all:"전체",watch:"시계",clothing:"의류",shoes:"신발",bag:"가방",beauty:"화장품",perfume:"향수",waBtn:"WhatsApp"},
"th":{site:"สินค้าหรู",all:"ทั้งหมด",watch:"นาฬิกา",clothing:"เสื้อผ้า",shoes:"รองเท้า",bag:"กระเป๋า",beauty:"เครื่องสำอาง",perfume:"น้ำหอม",waBtn:"WhatsApp"},
"vi":{site:"Nhà cung cấp xa xỉ",all:"Tất cả",watch:"Đồng hồ",clothing:"Quần áo",shoes:"Giày dép",bag:"Túi xách",beauty:"Mỹ phẩm",perfume:"Nước hoa",waBtn:"WhatsApp"},
"ms":{site:"Pembekal Mewah",all:"Semua",watch:"Jam",clothing:"Pakaian",shoes:"Kasut",bag:"Beg",beauty:"Kosmetik",perfume:"Minyak wangi",waBtn:"WhatsApp"},
"id":{site:"Pemasok Luxury",all:"Semua",watch:"Jam Tangan",clothing:"Pakaian",shoes:"Sepatu",bag:"Tas",beauty:"Kosmetik",perfume:"Parfum",waBtn:"WhatsApp"}
};

// 全球货币汇率
const rate = {
CNY:1, USD:0.138, EUR:0.128, GBP:0.11, AUD:0.21, CAD:0.19, SGD:0.18, HKD:1.08,
JPY:20.6, KRW:190, THB:4.9, MYR:0.64, IDR:2150, VND:3300, AED:0.51
};
const sym = {
CNY:"¥", USD:"$", EUR:"€", GBP:"£", AUD:"$", CAD:"$", SGD:"$", HKD:"$",
JPY:"¥", KRW:"₩", THB:"฿", MYR:"RM", IDR:"Rp", VND:"₫", AED:"د.إ"
};

// ================== 你的商品 ==================
const goodsList = [
{
cate:"bag",
name:"CarryAll EastWest手袋",
desc:"CarryAll EastWest手袋取材Monogram 帆布和皮革饰边，成就都市生活的贴身伴侣。充裕构型设有齐整内层，大号内袋再添功能元素。Monogram帆布拉链手拿包通过皮革带固定尺寸：20× 10× 33.5 厘米（高×宽×长度）",
baseCny:429,
imgArr:["images/watch1-1.jpg","images/bag1-2.jpg","images/bag1-3.jpg","images/bag1-4.jpg","images/bag1-5.jpg","images/bag1-6.jpg","images/bag1-7.jpg","images/bag1-8.jpg","images/bag1-9.jpg"],
waMsg:"Hi, I want to inquire about CarryAll EastWest handbag"
}
];
{
cate:"watch",
name:"劳力士黑水鬼劳力士Rolex黑盘潜航者<br/>型系列型号M126610LN-0001",
desc:"进口瑞士3235<br/>机芯顶级品质，直径：41M，陶瓷表圈，商务日常佩戴",
baseCny:3980,
imgArr:["images/watch2-1.jpg","images/watch2-2.jpg","images/watch2-3.jpg"],"images/watch2-4.jpg","images/watch2-5.jpg","images/watch2-6.jpg","images/watch2-7.jpg","images/watch2-8.jpg","images/watch2-9.jpg",
waMsg:"您好，咨询劳力士黑水鬼报价"
},
    
// =================================================

const waPhone = "8613410103614";
let nowLang = "zh-CN";
let nowCur = "CNY";

function price(cny){
    let v = (cny * rate[nowCur]).toFixed(2);
    return sym[nowCur] + v;
}

function render(){
    let L = langData[nowLang];
    document.getElementById("siteTitle").innerText = L.site;

    let cate = ["all","watch","clothing","shoes","bag","beauty","perfume"];
    let catHtml = "";
    cate.forEach((k,i)=>{
        catHtml += `<span class="cat-item ${i==0?'active':''}" data-c="${k}">${L[k]}</span>`;
    });
    document.getElementById("cateBox").innerHTML = catHtml;

    document.querySelectorAll(".cat-item").forEach(b=>{
        b.onclick = ()=>{
            document.querySelectorAll(".cat-item").forEach(x=>x.classList.remove("active"));
            b.classList.add("active");
            let c = b.dataset.c;
            c=="all" ? show(goodsList) : show(goodsList.filter(x=>x.cate==c));
        }
    });

    show(goodsList);
    document.getElementById("fixedWa").href = "https://wa.me/" + waPhone;
}

function show(list){
    let html = "";
    list.forEach(p=>{
        html += `
        <div class="pro-card" data-i="${goodsList.indexOf(p)}">
            <img src="${p.imgArr[0]}">
            <div class="pro-info">
                <div class="pro-name">${p.name}</div>
                <div class="pro-price">${price(p.baseCny)}</div>
            </div>
        </div>`;
    });
    document.getElementById("goodsBox").innerHTML = html;

    document.querySelectorAll(".pro-card").forEach(c=>{
        c.onclick = ()=>{
            let p = goodsList[Number(c.dataset.i)];
            document.getElementById("imgWrap").innerHTML = p.imgArr.map(x=>`<img src="${x}">`).join("");
            document.getElementById("popName").innerText = p.name;
            document.getElementById("popPrice").innerText = price(p.baseCny);
            document.getElementById("popDesc").innerText = p.desc;
            document.getElementById("popWaBtn").innerText = langData[nowLang].waBtn;
            document.getElementById("popWaLink").href = "https://wa.me/"+waPhone+"?text="+encodeURIComponent(p.waMsg);
            document.getElementById("bigModal").style.display = "flex";
        }
    });
}

function closeModal(){
    document.getElementById("bigModal").style.display = "none";
}

document.getElementById("langSel").onchange = function(){
    nowLang = this.value; render();
}
document.getElementById("curSel").onchange = function(){
    nowCur = this.value; render();
}

render();
</script>
</body>
</html>
