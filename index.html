<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>源头工厂外贸好物</title>
<!--轮播组件CDN-->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,system-ui}
body{background:#f7f7f7;color:#222}
header{background:#1a1a1a;color:#fff;padding:16px 5%;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:99}
.site-title{font-size:22px;font-weight:600}
.lang-btn{padding:6px 12px;border:1px solid #fff;background:transparent;color:#fff;border-radius:4px;cursor:pointer}
.container{max-width:1400px;margin:0 auto;padding:40px 3%}
.category-box{margin-bottom:30px}
.cat-tag{display:inline-block;padding:8px 16px;background:#eee;border-radius:20px;margin:0 6px 8px;cursor:pointer}
.cat-tag.active{background:#1a1a1a;color:#fff}
.pro-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:24px}
.pro-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px #00000012}
.pro-card img{width:100%;height:280px;object-fit:cover}
.pro-info{padding:16px}
.pro-name{font-size:16px;font-weight:500;margin-bottom:8px}
.pro-price{color:#c81623;font-size:18px;margin-bottom:12px}
.pro-btn{display:flex;gap:8px}
.pro-btn button{flex:1;padding:9px;border:none;border-radius:6px;cursor:pointer}
.btn-detail{background:#f0f0f0}
.btn-wa{background:#25D366;color:#fff}
/*弹窗样式*/
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#0008;display:none;z-index:999;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;width:min(92%,900px);border-radius:12px;display:grid;grid-template-columns:1fr 1fr;gap:24px;max-height:90vh;overflow-y:auto}
@media(max-width:768px){.modal-box{grid-template-columns:1fr}}
.modal-img{padding:20px}
.modal-text{padding:20px 20px 30px}
.close{position:absolute;top:15px;right:20px;font-size:28px;cursor:pointer;color:#333}
.swiper{width:100%;height:400px}
.swiper-slide img{width:100%;height:100%;object-fit:cover}
/*悬浮WA按钮*/
.fixed-wa{position:fixed;right:22px;bottom:25px;width:56px;height:56px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;color:#fff;font-size:28px;z-index:99}
</style>
</head>
<body>
<header>
<div class="site-title" id="siteTitle"></div>
<button class="lang-btn" onclick="switchLang()">EN/中文</button>
</header>
<div class="container">
  <div class="category-box" id="catBox"></div>
  <div class="pro-wrap" id="proBox"></div>
</div>
<!--详情弹窗-->
<div class="modal" id="modal">
  <div class="modal-box">
    <span class="close" onclick="closeModal()">×</span>
    <div class="modal-img">
      <div class="swiper mySwiper">
        <div class="swiper-wrapper" id="swiperWrap"></div>
        <div class="swiper-pagination"></div>
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>
      </div>
    </div>
    <div class="modal-text">
      <h3 id="modal-name" style="margin-bottom:12px;font-size:20px"></h3>
      <div id="modal-price" style="color:#c81623;font-size:20px;margin-bottom:16px"></div>
      <p id="modal-desc" style="line-height:1.7;color:#555;margin-bottom:24px"></p>
      <a id="modal-wa" target="_blank"><button style="width:100%;padding:12px;background:#25D366;border:none;color:#fff;border-radius:6px;font-size:16px">WhatsApp立即询价</button></a>
      <p id="modal-tip" style="margin-top:14px;font-size:13px;color:#777"></p>
    </div>
  </div>
</div>
<!--悬浮WA-->
<a class="fixed-wa" id="floatWa" target="_blank">WA</a>

<script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
<script src="./lang.js"></script>
<script>
let allPro=[];
let currPro=null;
//替换成你的WhatsApp国际号码，去掉+
const waPhone="86138XXXX1234";
//加载产品json
fetch("./products.json").then(res=>res.json()).then(data=>{
  allPro=data;
  renderCat();
  renderPro(allPro);
})

//渲染分类
function renderCat(){
  const cats=[...new Set(allPro.map(item=>item.category))];
  let html=`<span class="cat-tag active" data-cat="all">${langData[nowLang].all}</span>`;
  cats.forEach(c=>html+=`<span class="cat-tag" data-cat="${c}">${c}</span>`);
  document.getElementById("catBox").innerHTML=html;
  document.querySelectorAll(".cat-tag").forEach(t=>{
    t.onclick=()=>{
      document.querySelectorAll(".cat-tag").forEach(x=>x.classList.remove("active"));
      t.classList.add("active");
      const c=t.dataset.cat;
      c==="all"?renderPro(allPro):renderPro(allPro.filter(p=>p.category===c))
    }
  })
}

//渲染产品列表
function renderPro(list){
  let html="";
  list.forEach(p=>{
    const name=p.name[nowLang]||p.name["zh-CN"];
    html+=`
    <div class="pro-card">
      <img src="${p.images[0]}" alt="${name}">
      <div class="pro-info">
        <div class="pro-name">${name}</div>
        <div class="pro-price">$${p.priceUSD} / ¥${p.priceCNY}</div>
        <div class="pro-btn">
          <button class="btn-detail" onclick="openModal(${JSON.stringify(p).replace(/"/g,'&quot;')})">${langData[nowLang].detail}</button>
          <a href="https://wa.me/${waPhone}?text=${encodeURIComponent(p.waMsg)}" target="_blank"><button class="btn-wa">${langData[nowLang].inquiry}</button></a>
        </div>
      </div>
    </div>`
  })
  document.getElementById("proBox").innerHTML=html;
  document.getElementById("siteTitle").innerText=langData[nowLang].siteName;
  document.getElementById("floatWa").href=`https://wa.me/${waPhone}`;
}

//打开详情弹窗+轮播
function openModal(pro){
  currPro=pro;
  const name=pro.name[nowLang]||pro.name["zh-CN"];
  const desc=pro.desc[nowLang]||pro.desc["zh-CN"];
  //生成轮播图片
  let swiperHtml="";
  pro.images.forEach(img=>swiperHtml+=`<div class="swiper-slide"><img src="${img}"></div>`);
  document.getElementById("swiperWrap").innerHTML=swiperHtml;
  document.getElementById("modal-name").innerText=name;
  document.getElementById("modal-price").innerText=`USD $${pro.priceUSD} | CNY ¥${pro.priceCNY}`;
  document.getElementById("modal-desc").innerText=desc;
  document.getElementById("modal-tip").innerText=langData[nowLang].tip;
  document.getElementById("modal-wa").href=`https://wa.me/${waPhone}?text=${encodeURIComponent(pro.waMsg)}`;
  document.getElementById("modal").style.display="flex";
  //初始化轮播
  new Swiper(".mySwiper",{loop:true,pagination:{el:".swiper-pagination"},navigation:{prevEl:".swiper-button-prev",nextEl:".swiper-button-next"}})
}
function closeModal(){document.getElementById("modal").style.display="none"}

//切换语言
function switchLang(){
  nowLang=nowLang=="zh-CN"?"en":"zh-CN";
  renderCat();renderPro(allPro);
}
</script>
</body>
</html>
