<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>全球奢侈品货源｜手表·服装·鞋子·包包·化妆品·香水</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,system-ui}
body{background:#f7f7f7;color:#222}
header{background:#1a1a1a;color:#fff;padding:16px 5%;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:99}
.site-name{font-size:18px;font-weight:bold}
.head-select{display:flex;gap:10px}
select{padding:5px 8px;border-radius:4px;border:none;outline:none}
.container{max-width:1250px;margin:0 auto;padding:35px 3%}
.category{margin-bottom:30px}
.cat-item{display:inline-block;padding:7px 18px;border-radius:20px;background:#eee;margin:0 5px 8px;cursor:pointer}
.cat-item.active{background:#1a1a1a;color:#fff}
.pro-wrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:26px}
.pro-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 3px 12px #00000011;cursor:pointer}
.pro-card img{width:100%;height:270px;object-fit:cover}
.pro-info{padding:16px}
.pro-name{font-size:17px;margin-bottom:6px}
.pro-price{color:#e63946;font-size:19px;font-weight:bold;margin:8px 0}
.wa-btn{width:100%;padding:10px;background:#25D366;color:#fff;border:none;border-radius:6px;margin-top:10px;cursor:pointer;font-size:15px}
.modal{position:fixed;inset:0;background:#000000e0;display:none;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal-box{background:#fff;max-width:920px;width:100%;border-radius:12px;max-height:92vh;overflow-y:auto;display:grid;grid-template-columns:1fr 1fr;gap:25px;padding:20px}
@media(max-width:720px){.modal-box{grid-template-columns:1fr}}
.img-box{overflow-x:auto;display:flex;gap:8px;padding-bottom:8px}
.img-box img{height:360px;border-radius:6px;cursor:pointer}
.close{position:absolute;top:15px;right:25px;color:#fff;font-size:32px;cursor:pointer}
.desc-text{line-height:1.7;color:#444;margin:18px 0}
.fixed-wa{position:fixed;right:20px;bottom:25px;width:54px;height:54px;border-radius:50%;background:#25D366;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;text-decoration:none;z-index:98}
</style>
</head>
<body>
<header>
<div class="site-name" id="siteTitle">全球奢侈品货源</div>
<div class="head-select">
<select id="langSel">
<option value="zh-CN">简体中文</option>
<option value="zh-TW">繁體中文</option>
<option value="en">English</option>
</select>
<select id="curSel">
<option value="CNY">CNY ¥人民币</option>
<option value="USD">USD $美元</option>
<option value="EUR">EUR €欧元</option>
</select>
</div>
</header>

<div class="container">
<div class="category" id="cateBox"></div>
<div class="pro-wrap" id="goodsBox"></div>
</div>

<div class="modal" id="bigModal">
<span class="close" onclick="closeModal()">×</span>
<div class="modal-box">
<div class="img-box" id="imgWrap"></div>
<div class="text-box">
<h3 id="popName"></h3>
<div class="pro-price" id="popPrice"></div>
<div class="desc-text" id="popDesc"></div>
<p id="waTip"></p>
<a id="popWaLink" target="_blank"><button class="wa-btn" id="popWaBtn"></button></a>
</div>
</div>
</div>

<a href="" class="fixed-wa" id="fixedWa" target="_blank">WA</a>

<script>
const langPool={
"zh-CN":{site:"全球奢侈品货源｜手表·服装·鞋子·包包·化妆品·香水",all:"全部产品",watch:"手表",clothing:"服装",shoes:"鞋子",bag:"包包",beauty:"化妆品",perfume:"香水",waTip:"看中款式直接WhatsApp询价",waBtn:"WhatsApp咨询"},
"zh-TW":{site:"全球奢侈品貨源｜手錶·服裝·鞋子·包包·化妝品·香水",all:"全部商品",watch:"手錶",clothing:"服裝",shoes:"鞋子",bag:"包包",beauty:"化妝品",perfume:"香水",waTip:"透過WhatsApp詢價",waBtn:"WhatsApp諮詢"},
"en":{site:"Global Luxury Supplier | Watches·Clothing·Shoes·Bags·Beauty·Perfume",all:"All Products",watch:"Watches",clothing:"Clothing",shoes:"Shoes",bag:"Bags",beauty:"Beauty",perfume:"Perfume",waTip:"Inquire via WhatsApp",waBtn:"WhatsApp Chat"}
};
const rateSet={CNY:1,USD:0.138,EUR:0.121};
const symSet={CNY:"¥",USD:"$",EUR:"€"};

//=========商品列表【上新只在这里改】=========
const goodsList=[
{
cate:"bag",
name:"CarryAll EastWest手袋",
desc:"CarryAll EastWest手袋取材Monogram 帆布和皮革饰边，成就都市生活的贴身伴侣。充裕构型设有齐整内层，大号内袋再添功能元素。Monogram帆布拉链手拿包通过皮革带固定尺寸：20× 10× 33.5 厘米（高×宽×长度）",
baseCny:429,
imgArr:["images/watch1-1.jpg","images/watch1-2.jpg","images/watch1-3.jpg","images/watch1-4.jpg","images/watch1-5.jpg","images/watch1-6.jpg","images/watch1-7.jpg","images/watch1-8.jpg","images/watch1-9.jpg"],
waMsg:"您好，我想咨询CarryAll EastWest手袋报价"
}
];
//==========================================

const waPhone="8613410103614";

let nowLang="zh-CN";
let nowCur="CNY";

function getPrice(cny){
    let res=(cny*rateSet[nowCur]).toFixed(2);
    return symSet[nowCur]+res;
}

function refreshPage(){
    let lang=langPool[nowLang];
    document.getElementById("siteTitle").innerText=lang.site;
    let cateKeys=["all","watch","clothing","shoes","bag","beauty","perfume"];
    let cateHtml="";
    cateKeys.forEach((k,i)=>{cateHtml+=`<span class="cat-item ${i==0?'active':''}" data-c="${k}">${lang[k]}</span>`;});
    document.getElementById("cateBox").innerHTML=cateHtml;
    document.querySelectorAll(".cat-item").forEach(bt=>{
        bt.onclick=()=>{
            document.querySelectorAll(".cat-item").forEach(x=>x.classList.remove("active"));
            bt.classList.add("active");
            let c=bt.dataset.c;
            c=="all"?renderGoods(goodsList):renderGoods(goodsList.filter(it=>it.cate==c));
        }
    });
    renderGoods(goodsList);
    document.getElementById("fixedWa").href=`https://wa.me/${waPhone}`;
}

function renderGoods(arr){
    let gHtml="";
    arr.forEach(item=>{
        gHtml+=`<div class="pro-card" data-index="${goodsList.indexOf(item)}">
            <img src="${item.imgArr[0]}">
            <div class="pro-info">
                <div class="pro-name">${item.name}</div>
                <div class="pro-price">${getPrice(item.baseCny)}</div>
            </div>
        </div>`;
    });
    document.getElementById("goodsBox").innerHTML=gHtml;
    document.querySelectorAll(".pro-card").forEach(card=>{card.onclick=()=>openPop(goodsList[Number(card.dataset.index)]);});
}

function openPop(item){
    let l=langPool[nowLang];
    document.getElementById("imgWrap").innerHTML=item.imgArr.map(im=>`<img src="${im}">`).join("");
    document.getElementById("popName").innerText=item.name;
    document.getElementById("popPrice").innerText=getPrice(item.baseCny);
    document.getElementById("popDesc").innerText=item.desc;
    document.getElementById("waTip").innerText=l.waTip;
    document.getElementById("popWaBtn").innerText=l.waBtn;
    document.getElementById("popWaLink").href=`https://wa.me/${waPhone}?text=${encodeURIComponent(item.waMsg)}`;
    document.getElementById("bigModal").style.display="flex";
}
function closeModal(){document.getElementById("bigModal").style.display="none";}
document.getElementById("langSel").onchange=function(){nowLang=this.value;refreshPage();};
document.getElementById("curSel").onchange=function(){nowCur=this.value;refreshPage();};
refreshPage();
</script>

</body>
</html>
