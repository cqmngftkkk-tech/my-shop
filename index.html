<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CarryAll EastWest 手袋</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
    body{background:#f5f5f5;color:#222}
    header{background:#111;color:#fff;padding:16px;display:flex;justify-content:space-between;align-items:center}
    .lang{padding:6px 10px;background:#333;color:#fff;border:none;border-radius:4px}
    
    .product{max-width:500px;margin:30px auto;background:#fff;border-radius:12px;overflow:hidden}
    .product img{width:100%;height:auto}
    .info{padding:20px}
    .name{font-size:20px;margin-bottom:10px}
    .price{font-size:22px;color:#e53935;margin:10px 0}
    .desc{line-height:1.7;color:#555;margin:15px 0}
    
    .whatsapp{display:block;background:#25D366;color:#fff;text-align:center;padding:14px;border-radius:8px;text-decoration:none;font-size:16px;margin-top:20px}
    .images{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px}
    .images img{width:100%;height:160px;object-fit:cover}
  </style>
</head>

<body>
  <header>
    <div>精品手袋</div>
    <button class="lang" onclick="toggleLang()">中 / EN</button>
  </header>

  <div class="product">
    <div class="images">
      <img src="images/watch1-1.jpg">
      <img src="images/watch1-2.jpg">
      <img src="images/watch1-3.jpg">
      <img src="images/watch1-4.jpg">
      <img src="images/watch1-5.jpg">
      <img src="images/watch1-6.jpg">
      <img src="images/watch1-7.jpg">
      <img src="images/watch1-8.jpg">
      <img src="images/watch1-9.jpg" style="grid-column:span 2">
    </div>

    <div class="info">
      <h2 class="name">CarryAll EastWest 手袋</h2>
      <div class="price">¥2100 | $300</div>
      <div class="desc">
        CarryAIIEastWest手袋取材Monogram 帆布和皮革饰边，成就都市生活的贴身伴侣。充裕构型设有齐整内层，大号内袋再添功能元素。Monogram帆布拉链手拿包通过皮革带固定尺寸：20× 10× 33.5 厘米（高×宽×长度）
      </div>

      <a href="https://wa.me/8613410103614" class="whatsapp" target="_blank">
        📩 点击直接 WhatsApp 咨询价格
      </a>
    </div>
  </div>

  <script>
    let isCN = true
    function toggleLang(){
      isCN = !isCN
      if(!isCN){
        document.querySelector('.name').innerText = "CarryAll EastWest Handbag"
        document.querySelector('.desc').innerText = "CarryAll EastWest is made of Monogram canvas and leather trim. Roomy structure with neat inner layer. Size: 20 × 10 × 33.5 cm"
        document.querySelector('.whatsapp').innerText = "📩 Chat on WhatsApp for Price"
      }else{
        document.querySelector('.name').innerText = "CarryAll EastWest 手袋"
        document.querySelector('.desc').innerText = "CarryAIIEastWest手袋取材Monogram 帆布和皮革饰边，成就都市生活的贴身伴侣。充裕构型设有齐整内层，大号内袋再添功能元素。Monogram帆布拉链手拿包通过皮革带固定尺寸：20× 10× 33.5 厘米（高×宽×长度）"
        document.querySelector('.whatsapp').innerText = "📩 点击直接 WhatsApp 咨询价格"
      }
    }
  </script>
</body>
</html>
